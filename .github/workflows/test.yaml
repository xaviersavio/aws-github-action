name: List S3 buckets

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  listing_buckets:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Validate AWS inputs
        run: |
          if [ -z "${{ secrets.AWS_REGION }}" ]; then echo "Missing AWS_REGION secret" >&2; exit 1; fi
          if [ -z "${{ secrets.AWS_ROLE || secrets.IAM_ROLE }}" ]; then echo "Missing AWS_ROLE or IAM_ROLE secret" >&2; exit 1; fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.IAM_ROLE }}
        
        
       

      - name: List S3 buckets
        run: |
          echo "Listing S3 Buckets"
          aws s3 ls

